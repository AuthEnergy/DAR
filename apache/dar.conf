<VirtualHost *:443>
    ServerName api.central.consent

    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/dar.crt
    SSLCertificateKeyFile /etc/ssl/private/dar.key
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5

    WSGIDaemonProcess dar_api \
        user=www-data \
        group=www-data \
        processes=4 \
        threads=8 \
        python-home=/var/www/DAR/venv

    WSGIProcessGroup  dar_api
    WSGIScriptAlias / /var/www/DAR/wsgi.py

    <Directory /var/www/DAR>
        Require all granted
    </Directory>

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-Frame-Options           "DENY"
    Header always set Referrer-Policy           "no-referrer"

    ErrorLog  ${APACHE_LOG_DIR}/dar_error.log
    CustomLog ${APACHE_LOG_DIR}/dar_access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName api.central.consent
    Redirect permanent / https://api.central.consent/
</VirtualHost>
