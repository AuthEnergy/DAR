services:

  couchdb:
    image: couchdb:3.3
    restart: unless-stopped
    environment:
      COUCHDB_USER:     admin
      COUCHDB_PASSWORD: devpassword
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://admin:devpassword@localhost:5984/_up"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      COUCHDB_URL:      http://couchdb:5984
      COUCHDB_USER:     admin
      COUCHDB_PASSWORD: devpassword
      JWT_SECRET:       dev-jwt-secret-change-in-production
      PORTAL_BASE_URL:  http://localhost:5001
      DEBUG:            "true"
    ports:
      - "5001:5000"
    depends_on:
      couchdb:
        condition: service_healthy
    command: python wsgi.py

volumes:
  couchdb_data:
