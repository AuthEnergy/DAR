openapi: 3.1.0
info:
  title: Data Access Register
  description: |
    Core APIs for the Central Data Access Register.

    The register records all lawful access to customer energy data by Controllers,
    regardless of the legal basis on which that access rests. It is not exclusively
    a consent register — legitimate interests, public task, legal obligation, and
    contract are all within scope alongside consent-based access.

    **Jurisdiction:** This is a UK-only solution. All Controllers, customers, and
    meter points are within Great Britain. The governing data protection framework
    is **UK GDPR** and the **Data Protection Act 2018**. EU GDPR does not apply.
    The jurisdiction field is fixed to `GB` and does not need to be supplied.

    ## Purpose

    The register provides a single, auditable source of truth for:

    - **Controllers** — to record and demonstrate the legal basis under which they
      access customer meter data.
    - **Data Providers** — to verify that a Controller has a registered, active access
      record before releasing data.
    - **Customers** — to view all parties registered as having lawful access to their
      meter point, on request via any Controller.

    ## Party Model

    | Party | UK GDPR Role | Description |
    |---|---|---|
    | **Data User** | Processor | Operates the register. Fetches and processes meter data on behalf of Controllers. Authenticated via bearer token. |
    | **Controller** | Data Controller | A B2B customer of the Data User. Supplied inline on registration. Bears GDPR accountability for the legal basis and its ongoing validity. |
    | **Customer** | Data Subject | The energy customer. Identified by MPxN to minimise PII held centrally. |
    | **Data Provider** | Data Source | Holds meter data. Verifies access records before releasing data via `GET /access-records/{ak}`. |

    ## Record Structure

    All access records share a single schema — `AccessRecord` — with four sections
    aligned to ISO/IEC TS 27560:2023:

    1. **`record-metadata`** — record identifier, creation timestamp, Controller
       identity, PII Principal identity. Present for all records.
    2. **`notice`** — the privacy notice presented to the customer. Present only for
       consent-based records; null for all other legal bases.
    3. **`processing`** — legal basis, purpose, data types, and related obligations.
       Present for all records.
    4. **`access-event`** — when and how access was registered or consent was obtained;
       current lifecycle state. Present for all records.

    The `notice` and `access-event.consent` sub-object are null for non-consent records.
    The `access-event.consent` sub-object is null for non-consent records and populated
    for consent records.

    ## Legal Basis and Required Fields

    The `processing.legal-basis` value determines which fields within `notice` and
    `access-event.consent` are expected:

    | Legal basis | `notice` | `access-event.consent` |
    |---|---|---|
    | `uk-consent`, `uk-explicit-consent` | **Required** | **Required** |
    | All other bases | Must be null | Must be null |

    For legitimate interests records, `processing.lia-reference` should be supplied.
    For public task or legal obligation records, `processing.statutory-reference`
    should be supplied.

    ## Access Record Lifecycle

    Records are never hard-deleted. All state transitions are recorded with timestamps.

    ```
    [ACTIVE] ──revoke──▶ [REVOKED]
    [ACTIVE] ──expiry──▶ [EXPIRED]
    ```

    `REVOKED` represents consent withdrawal (consent records) or the Controller
    removing their registration (non-consent records). Data Providers must deny
    access for any record not in `ACTIVE` state with a future (or null) expiry.

    ## Authentication

    All endpoints except `GET /access-records/{ak}` require a bearer token from
    `GET /auth/token`. Tokens expire after 7200 seconds.

    ## Versioning

    URI-based versioning. Current version: `v1`.

  version: "0.0.7"
  contact:
    name: Auth Energy
    email: contact@auth.energy
    url: https://docs.auth.energy/consent
  license:
    name: Proprietary

servers:
  - url: "https://api.central.consent/v1"
    description: Production

tags:
  - name: Authentication
    description: Obtain bearer tokens for authenticated endpoints.
  - name: Data Users
    description: >
      Endpoints for Data Users (Processors) to register and manage access records
      on behalf of their Controller customers.
  - name: Data Providers
    description: >
      Endpoints for Data Providers to verify access records before releasing meter data.

paths:
  /auth/token:
    get:
      operationId: getAuthToken
      summary: Obtain Bearer Token
      description: |
        Exchange Basic Auth credentials for a short-lived JWT bearer token.
        Cache and reuse until expiry. Credentials Base64-encoded as `account_id:secret_key`.
      tags:
        - Authentication
      security:
        - basicAuth: []
      responses:
        "200":
          description: Token issued successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          $ref: "#/components/responses/Unauthorised"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /access-records:
    post:
      operationId: registerAccess
      summary: Register or Update an Access Record
      description: |
        Register a new access record on behalf of a Controller, or update an existing
        one by supplying the `ak` query parameter.

        All records use the same `AccessRecord` schema. The `processing.legal-basis`
        value determines which additional fields are expected:

        - **Consent bases** — populate `notice` and `access-event.consent`.
        - **Legitimate interests** — populate `processing.lia-reference`; set `notice`
          and `access-event.consent` to null.
        - **Public task / legal obligation** — populate `processing.statutory-reference`;
          set `notice` and `access-event.consent` to null.
        - **Contract** — set `notice` and `access-event.consent` to null.

        Historic records may be submitted — `access-event.registered-at` may predate
        `record-metadata.created-at`.
      tags:
        - Data Users
      security:
        - bearerAuth: []
      parameters:
        - name: ak
          in: query
          description: >
            Supply to update an existing access record. The record identified by this
            key will be replaced with the submitted payload.
          required: false
          schema:
            $ref: "#/components/schemas/AccessKey"
      requestBody:
        description: An AccessRecord. All legal bases use this same schema.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRecord"
            examples:
              consent:
                summary: Consent-based access
                value:
                  record-metadata:
                    schema-version: "1.0"
                    controller:
                      name: "Bright Energy Ltd"
                      contact-url: "https://bright-energy.com/contact"
                      address:
                        addressLine1: "10 Canary Wharf"
                        townCity: "London"
                        postcode: "E14 5AB"
                    pii-principal:
                      mpxn: "1234567890123"
                      move-in-date: "2022-06-30"
                      address:
                        addressLine1: "221B Baker Street"
                        townCity: "London"
                        postcode: "NW1 6XE"
                  notice:
                    terms-url: "https://bright-energy.com/privacy-v3.html"
                    notice-version: "v3.2"
                    notice-language: "en"
                  processing:
                    legal-basis: "uk-consent"
                    purpose: "Energy efficiency analysis and tariff recommendations"
                    data-types:
                      - HH-CONSUMPTION
                      - HH-EXPORT
                    privacy-rights-url: "https://bright-energy.com/your-rights"
                  access-event:
                    state: ACTIVE
                    registered-at: "2023-11-07T05:31:56Z"
                    expiry: "2027-11-10T17:07:01.580Z"
                    controller-reference: "REF-00123"
                    consent:
                      consent-type: expressed-consent
                      method: "Explicit web checkbox"
                      expressed-by: data-subject
                      principal-verification:
                        method: "credit-card"
                        verified-at: "2023-11-07T05:30:45Z"
                        outcome: verified
                        reference: "ch_3ABC123xyz"
                        submitted: "XXXX-XXXX-XXXX-4242"
                        verified-against: "Stripe customer record cus_ABC123"
                        detail:
                          last4: "4242"
                          brand: "visa"
                          stripe_customer: "cus_ABC123"
              legitimate-interests:
                summary: Legitimate interests access
                value:
                  record-metadata:
                    schema-version: "1.0"
                    controller:
                      name: "Grid Analytics Ltd"
                      contact-url: "https://gridanalytics.com/contact"
                      address:
                        addressLine1: "5 Tech Park"
                        townCity: "Manchester"
                        postcode: "M1 2AB"
                    pii-principal:
                      mpxn: "1234567890123"
                      move-in-date: "2020-01-01"
                  notice: null
                  processing:
                    legal-basis: "uk-legitimate-interests"
                    purpose: "Network load balancing and demand forecasting"
                    data-types:
                      - HH-CONSUMPTION
                    privacy-rights-url: "https://gridanalytics.com/your-rights"
                    lia-reference: "LIA-2024-003"
                  access-event:
                    state: ACTIVE
                    registered-at: "2024-03-01T09:00:00Z"
                    expiry: "2026-03-01T00:00:00Z"
                    controller-reference: "CONTRACT-9981"
                    consent: null
              public-task:
                summary: Public task access (regulated/statutory body)
                value:
                  record-metadata:
                    schema-version: "1.0"
                    controller:
                      name: "Northern Networks plc"
                      contact-url: "https://northernnetworks.co.uk/contact"
                      address:
                        addressLine1: "1 Grid House"
                        townCity: "Leeds"
                        postcode: "LS1 1AA"
                    pii-principal:
                      mpxn: "1234567890123"
                      move-in-date: "2019-06-01"
                  notice: null
                  processing:
                    legal-basis: "uk-public-task"
                    purpose: "Statutory network safety and capacity monitoring"
                    data-types:
                      - HH-CONSUMPTION
                      - HH-EXPORT
                    privacy-rights-url: "https://northernnetworks.co.uk/your-rights"
                    statutory-reference: "Energy Act 2023, s.147"
                  access-event:
                    state: ACTIVE
                    registered-at: "2024-01-15T00:00:00Z"
                    expiry: null
                    controller-reference: "OFGEM-AUTH-2024-0042"
                    consent: null
      responses:
        "201":
          description: New access record created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterAccessResponse"
        "200":
          description: Existing access record updated successfully (when ak supplied).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterAccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorised"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /access-records/{ak}:
    get:
      operationId: verifyAccess
      summary: Verify Access Record
      description: |
        Returns the full access record for a given access key. Called by Data Providers
        before releasing meter data.

        **Authentication:** Unauthenticated by design. The access key acts as the
        credential; treat it as a secret.

        **Verification checklist (all record types):**
        1. `access-event.state` must be `ACTIVE`.
        2. `access-event.expiry` must be in the future, or null.
        3. `record-metadata.controller` identity must match the organisation you have
           a verified commercial relationship with on your platform.
        4. The data types being requested must be within `processing.data-types`.
        5. Log `response.transaction-id` for your audit trail.

        **Additional checks by legal basis:**
        - Consent records: confirm `access-event.consent.consent-type` is appropriate
          for the data category being released.
        - Legitimate interests: confirm `processing.lia-reference` is present.
        - Public task / legal obligation: confirm `processing.statutory-reference`
          is present.
      tags:
        - Data Providers
      parameters:
        - name: ak
          in: path
          description: The access key issued at registration.
          required: true
          schema:
            $ref: "#/components/schemas/AccessKey"
      responses:
        "200":
          description: Access record found and returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyAccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      operationId: revokeAccess
      summary: Revoke Access Record
      description: |
        Revokes an access record. Transitions the record to `REVOKED` state with a
        `revoked-at` timestamp. Records are retained for audit — not deleted.

        For consent records this represents customer withdrawal of consent.
        For non-consent records this represents the Controller removing their
        access registration (e.g. LIA no longer applicable, contract ended,
        statutory authority lapsed).

        After revocation `GET /access-records/{ak}` returns the record in `REVOKED`
        state. Data Providers must deny access for any non-`ACTIVE` record.
      tags:
        - Data Users
      security:
        - bearerAuth: []
      parameters:
        - name: ak
          in: path
          description: The access key to revoke.
          required: true
          schema:
            $ref: "#/components/schemas/AccessKey"
      responses:
        "200":
          description: Access record revoked. Record retained in REVOKED state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeAccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorised"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /meter-points/{mpxn}/access-records:
    get:
      operationId: listAccessRecords
      summary: List Access Records for a Meter Point
      description: |
        Returns access records associated with a given MPxN, registered by the
        authenticated Data User. Covers all legal bases and all lifecycle states
        unless filtered. Supports customer transparency — customers may request
        this list via any Controller to see who holds registered access to their
        meter point data.
      tags:
        - Data Users
      security:
        - bearerAuth: []
      parameters:
        - name: mpxn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MPxN"
        - name: state
          in: query
          description: Filter by record lifecycle state. Omit to return all states.
          required: false
          schema:
            $ref: "#/components/schemas/AccessState"
        - name: legal-basis
          in: query
          description: Filter by legal basis. Omit to return all bases.
          required: false
          schema:
            $ref: "#/components/schemas/LegalBasis"
      responses:
        "200":
          description: Access record list returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessRecordsResponse"
        "401":
          $ref: "#/components/responses/Unauthorised"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Base64-encode `account_id:secret_key`. Used only on `GET /auth/token`.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT from `GET /auth/token`. Pass as `Authorization: Bearer <token>`. Expires after 7200s."

  responses:
    BadRequest:
      description: The request was malformed or failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorised:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated caller lacks permission for this action.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: An unexpected server-side error occurred.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # -------------------------------------------------------------------------
    # Primitive / shared types
    # -------------------------------------------------------------------------

    MPxN:
      type: string
      pattern: "^(?:[0-9A-HJ-NPR-Z]{2}[0-9]{8,10}|[0-9]{10})$"
      description: Meter Point Administration Number (MPAN) or Meter Point Reference Number (MPRN).
      example: "1234567890123"

    AccessKey:
      type: string
      pattern: "^ak_[0-9a-f]{24}$"
      description: >
        Unique opaque identifier for an access record, issued by the register on
        creation. Treat as a secret — possession enables access verification.
      example: "ak_691df0c788ca043403b7fa90"

    DataType:
      type: array
      minItems: 1
      description: One or more energy data categories covered by this access record.
      items:
        type: string
        enum:
          - HH-CONSUMPTION
          - HH-EXPORT
          - MTH-CONSUMPTION
          - MTH-EXPORT
          - ANNUAL-CONSUMPTION
          - ANNUAL-EXPORT
          - TARIFF-IMPORT
          - TARIFF-EXPORT

    AccessState:
      type: string
      description: |
        Lifecycle state of the access record.

        - `ACTIVE` — access is registered and in force.
        - `EXPIRED` — the record's `expiry` has passed.
        - `REVOKED` — the Controller has removed their registration, or the customer
          has withdrawn consent. Retained for audit with `access-event.revoked-at` set.
      enum:
        - ACTIVE
        - EXPIRED
        - REVOKED

    LegalBasis:
      type: string
      description: |
        The legal basis under which the Controller accesses customer data.

        **Consent bases** — `notice` and `access-event.consent` must be populated.

        | Value | Plain name | Article |
        |---|---|---|
        | `uk-consent` | UK Consent | UK GDPR Art. 6(1)(a) |
        | `uk-explicit-consent` | UK Explicit Consent | UK GDPR Art. 9(2)(a) |

        **Non-consent bases** — `notice` and `access-event.consent` must be null.

        | Value | Plain name | Article | Supporting field |
        |---|---|---|---|
        | `uk-legitimate-interests` | UK Legitimate Interests | UK GDPR Art. 6(1)(f) | `processing.lia-reference` |
        | `uk-public-task` | UK Public Task | UK GDPR Art. 6(1)(e) | `processing.statutory-reference` |
        | `uk-legal-obligation` | UK Legal Obligation | UK GDPR Art. 6(1)(c) | `processing.statutory-reference` |
        | `uk-contract` | UK Contract | UK GDPR Art. 6(1)(b) | — |
      enum:
        - uk-consent
        - uk-explicit-consent
        - uk-legitimate-interests
        - uk-public-task
        - uk-legal-obligation
        - uk-contract
      example: "uk-consent"

    ConsentType:
      type: string
      description: |
        Legal type of consent expressed. Only applicable when `legal-basis` is a
        consent value.

        - `expressed-consent` — actively and unambiguously expressed (e.g. checkbox).
          Sufficient for standard personal data under Art. 6(1)(a).
        - `explicit-consent` — explicit and specific. Required for special category
          data under Art. 9(2)(a), or where the Controller's process mandates it.
      enum:
        - expressed-consent
        - explicit-consent

    ExpressionByEntity:
      type: string
      description: |
        Who expressed consent. Only applicable when `legal-basis` is a consent value.

        - `data-subject` — the customer themselves.
        - `authorised-representative` — a third party acting on the customer's behalf
          (e.g. a landlord or property manager acting for a tenant).
      enum:
        - data-subject
        - authorised-representative

    UKAddress:
      type: object
      properties:
        addressLine1:
          type: string
          maxLength: 100
          example: "221B Baker Street"
        addressLine2:
          type: string
          maxLength: 100
          nullable: true
          example: "Marylebone"
        townCity:
          type: string
          maxLength: 100
          example: "London"
        county:
          type: string
          maxLength: 100
          nullable: true
          example: "Greater London"
        postcode:
          type: string
          pattern: "^[A-Z]{1,2}[0-9][0-9A-Z]? ?[0-9][A-Z]{2}$"
          example: "NW1 6XE"
      required:
        - addressLine1
        - townCity
        - postcode

    # -------------------------------------------------------------------------
    # ISO 27560 Section 1: Record Metadata
    # -------------------------------------------------------------------------

    Controller:
      type: object
      description: >
        The Data Controller — the B2B customer of the Data User (Processor). Supplied
        inline on registration. Bears GDPR accountability for the legal basis claimed
        and its ongoing validity.
      properties:
        name:
          type: string
          maxLength: 255
          description: Trading name of the Controller organisation.
          example: "Bright Energy Ltd"
        contact-url:
          type: string
          format: uri
          description: URL of the Controller's customer-facing contact or privacy page.
          example: "https://bright-energy.com/contact"
        address:
          $ref: "#/components/schemas/UKAddress"
      required:
        - name
        - contact-url

    PIIPrincipal:
      type: object
      description: >
        Identifies the customer and their property. MPxN is the primary identifier;
        personal name and email are excluded to minimise PII held centrally.
      properties:
        mpxn:
          $ref: "#/components/schemas/MPxN"
        move-in-date:
          type: string
          format: date
          description: >
            Date the customer began occupying the property. Establishes the earliest
            point from which data access applies (inclusive).
          example: "2022-06-30"
        address:
          $ref: "#/components/schemas/UKAddress"
      required:
        - mpxn
        - move-in-date

    RecordMetadata:
      type: object
      description: |
        **ISO 27560 Section 1 — Record Metadata**

        `record-identifier` and `created-at` are assigned by the register on creation
        and returned in responses; they must not be supplied in request bodies.
      properties:
        schema-version:
          type: string
          description: Version of the schema profile this record conforms to.
          example: "1.0"
        record-identifier:
          readOnly: true
          $ref: "#/components/schemas/AccessKey"
        created-at:
          type: string
          format: date-time
          readOnly: true
          description: >
            UTC timestamp when this record was created in the register. May differ
            from `access-event.registered-at` for historic registrations.
          example: "2024-01-15T09:30:00Z"
        controller:
          $ref: "#/components/schemas/Controller"
        pii-principal:
          $ref: "#/components/schemas/PIIPrincipal"
      required:
        - schema-version
        - controller
        - pii-principal

    # -------------------------------------------------------------------------
    # ISO 27560 Section 2: Notice Fields
    # Present for consent records; null for non-consent records.
    # -------------------------------------------------------------------------

    NoticeFields:
      type: object
      description: |
        **ISO 27560 Section 2 — Notice Fields**

        Records the privacy notice presented to the customer at the point of consent.
        Must be populated for consent-based records (`uk-consent`, `uk-explicit-consent`).
        Must be null for all other legal bases —
        no consent notice is presented for legitimate interests, public task, or contract.

        `notice-version` alongside `terms-url` provides a stable audit reference;
        notice content may change at the same URL over time.
      properties:
        terms-url:
          type: string
          format: uri
          description: >
            URL of the Controller's privacy notice the customer agreed to.
            Must remain publicly accessible for the duration of any audit obligation.
          example: "https://bright-energy.com/privacy-v3.html"
        notice-version:
          type: string
          maxLength: 50
          description: >
            Version identifier of the specific notice agreed to, independent of URL.
          example: "v3.2"
        notice-language:
          type: string
          description: ISO 639-1 language code of the notice presented to the customer.
          example: "en"
      required:
        - terms-url
        - notice-version

    # -------------------------------------------------------------------------
    # ISO 27560 Section 3: Processing Fields
    # -------------------------------------------------------------------------

    Recipient:
      type: object
      description: A third party to whom customer data may be disclosed.
      properties:
        name:
          type: string
          maxLength: 255
          example: "Analytics Co Ltd"
        role:
          type: string
          maxLength: 100
          description: >
            Role of this recipient (e.g. "Sub-processor", "Joint Controller",
            "Third Party Recipient").
          example: "Sub-processor"
        privacy-url:
          type: string
          format: uri
          example: "https://analyticsco.com/privacy"
      required:
        - name
        - role

    StorageConditions:
      type: object
      properties:
        location:
          type: string
          description: ISO 3166-1 alpha-2 country code where data is stored. Expected to be `GB` for UK-only deployments.
          example: "GB"
        retention-period:
          type: string
          description: ISO 8601 duration for data retention after expiry or revocation.
          example: "P2Y"
      required:
        - location
        - retention-period

    ProcessingFields:
      type: object
      description: |
        **ISO 27560 Section 3 — Processing Fields**

        Defines the scope and legal basis of data access. `legal-basis` and
        `privacy-rights-url` are required for all record types.

        For **legitimate interests** records, `lia-reference` should be supplied —
        its absence is valid but indicates an incomplete audit trail.

        For **public task** or **legal obligation** records, `statutory-reference`
        should be supplied identifying the specific legislation or regulatory condition
        authorising access.
      properties:
        legal-basis:
          $ref: "#/components/schemas/LegalBasis"
        purpose:
          type: string
          maxLength: 500
          description: >
            Human-readable description of why the Controller is accessing this data.
            Required by GDPR Art. 13(1)(c).
          example: "Energy efficiency analysis and tariff recommendations"
        data-types:
          $ref: "#/components/schemas/DataType"
        privacy-rights-url:
          type: string
          format: uri
          description: >
            URL of the Controller's data subject rights page. Required by
            GDPR Art. 13(2)(b)/(c) for all legal bases.
          example: "https://bright-energy.com/your-rights"
        lia-reference:
          type: string
          maxLength: 255
          description: >
            Reference to the Controller's Legitimate Interests Assessment for this
            processing activity. Expected when `legal-basis` is `uk-legitimate-interests`.
          example: "LIA-2024-003"
        statutory-reference:
          type: string
          maxLength: 500
          description: >
            The statutory instrument, regulation, or licence condition authorising
            access. Expected when `legal-basis` is `uk-public-task` or `uk-legal-obligation`.
          example: "Energy Act 2023, s.147"
        jurisdiction:
          type: string
          enum:
            - GB
          default: "GB"
          readOnly: true
          description: >
            Jurisdiction governing processing. Fixed to `GB` (Great Britain) as this
            is a UK-only register operating under UK GDPR and the Data Protection
            Act 2018. This field is set automatically and does not need to be supplied.
        data-source:
          type: string
          maxLength: 255
          description: Name of the organisation(s) from which meter data is sourced.
          example: "National Grid ESO / MPAS"
        recipients:
          type: array
          description: Third parties to whom data may be disclosed. Omit if none.
          items:
            $ref: "#/components/schemas/Recipient"
        storage-conditions:
          $ref: "#/components/schemas/StorageConditions"
      required:
        - legal-basis
        - purpose
        - data-types
        - privacy-rights-url

    # -------------------------------------------------------------------------
    # ISO 27560 Section 4: Access Event Fields
    # ConsentDetails sub-object is populated for consent records, null otherwise.
    # -------------------------------------------------------------------------

    PrincipalVerification:
      type: object
      description: |
        Records how the Controller verified the identity of the principal *before*
        consent was obtained.

        Identity verification and consent expression are distinct processes:
        - **Verification** confirms that the person is who they claim to be.
        - **Consent** records that the verified person agreed to processing.

        This object captures the verification event in a generic envelope applicable
        to all methods. Method-specific supplementary data that does not fit the
        standard fields may be placed in `detail`.

        `submitted` must always be redacted — the register must never hold a full
        card number, full account number, or other unredacted sensitive credential.
      properties:
        method:
          type: string
          maxLength: 100
          description: >
            The verification mechanism used to confirm the principal's identity
            (e.g. "credit-card", "account-postcode", "in-home-display",
            "gov-id-check", "existing-authenticated-session").
          example: "credit-card"
        verified-at:
          type: string
          format: date-time
          description: UTC timestamp of when the verification was performed.
          example: "2023-11-07T05:31:00Z"
        outcome:
          type: string
          enum:
            - verified
            - failed
            - partial
          description: |
            Result of the verification check.
            - `verified` — identity confirmed.
            - `failed` — verification was attempted but could not be confirmed.
            - `partial` — some signals matched but full verification was not achieved
              (e.g. postcode matched but name did not).
          example: "verified"
        reference:
          type: string
          maxLength: 255
          description: >
            Opaque reference to the verification event in the external system.
            Allows the Controller to look up the full verification record
            (e.g. Stripe charge ID, IHD session ID, CRM verification ticket number).
          example: "ch_3ABC123xyz"
        submitted:
          type: string
          maxLength: 255
          description: >
            Redacted representation of the credential or value submitted by the
            principal (e.g. "XXXX-XXXX-XXXX-4242", "postcode SW1A 1AA",
            "IHD code 6-digit entry"). Must never contain unredacted sensitive data.
          example: "XXXX-XXXX-XXXX-4242"
        verified-against:
          type: string
          maxLength: 255
          description: >
            Description of what the submitted value was checked against
            (e.g. "Stripe customer record cus_ABC123",
            "Smart meter pairing code issued by DCC",
            "Utility account postcode on file in CRM").
          example: "Stripe customer record cus_ABC123"
        detail:
          type: object
          additionalProperties: true
          description: >
            Freeform object for method-specific supplementary data not captured by
            the standard fields. Controllers may include any additional verification
            metadata here (e.g. card brand, device ID, assurance level).
          example:
            last4: "4242"
            brand: "visa"
            stripe_customer: "cus_ABC123"
      required:
        - method
        - verified-at
        - outcome

    ConsentDetails:
      type: object
      description: |
        Consent-specific event details. Nested within `access-event`. Must be
        populated when `processing.legal-basis` is a consent value; must be null
        for all other legal bases.
      properties:
        consent-type:
          $ref: "#/components/schemas/ConsentType"
        method:
          type: string
          maxLength: 100
          description: >
            Mechanism through which consent was expressed — how the principal
            indicated their agreement (e.g. "Explicit web checkbox",
            "Signed paper form", "Voice recording", "In-app toggle").
            This field records consent expression, not identity verification.
            Identity verification is recorded in `principal-verification`.
          example: "Explicit web checkbox"
        expressed-by:
          $ref: "#/components/schemas/ExpressionByEntity"
        principal-verification:
          nullable: true
          description: >
            How the Controller verified the identity of the principal before
            consent was obtained. Strongly recommended for all consent records.
            Null indicates no structured verification data was recorded.
          allOf:
            - $ref: "#/components/schemas/PrincipalVerification"
      required:
        - consent-type
        - expressed-by

    AccessEventFields:
      type: object
      description: |
        **ISO 27560 Section 4 — Access Event Fields**

        Records when access was registered, its lifecycle state and duration, and
        (for consent records) the specific details of how consent was expressed.

        `registered-at` serves as the canonical event timestamp for all record types —
        for consent records it is the date the customer gave consent; for non-consent
        records it is the date the Controller registered their access.

        `revoked-at` is set by the register on revocation and must not be supplied
        in request bodies.
      properties:
        state:
          $ref: "#/components/schemas/AccessState"
        registered-at:
          type: string
          format: date-time
          description: >
            For consent records: date and time the customer gave consent.
            For non-consent records: date and time the Controller registered access.
            May predate `record-metadata.created-at` for historic registrations.
          example: "2023-11-07T05:31:56Z"
        expiry:
          type: string
          format: date-time
          nullable: true
          description: >
            When this access registration expires. Null indicates no defined end date.
            Data Providers must deny access once this timestamp has passed.
          example: "2027-11-10T17:07:01.580Z"
        controller-reference:
          type: string
          maxLength: 255
          description: >
            Controller's internal reference for this registration (e.g. CRM ID,
            contract number, or LIA document reference).
          example: "REF-00123"
        consent:
          nullable: true
          description: >
            Populated for consent-based records; null for all other legal bases.
          allOf:
            - $ref: "#/components/schemas/ConsentDetails"
        revoked-at:
          type: string
          format: date-time
          readOnly: true
          description: >
            UTC timestamp of revocation. Set by the register; not accepted in requests.
          example: "2025-06-01T14:22:00Z"
      required:
        - state
        - registered-at
        - expiry
        - consent

    # -------------------------------------------------------------------------
    # Top-level Access Record — single unified schema for all legal bases
    # -------------------------------------------------------------------------

    AccessRecord:
      type: object
      description: |
        A data access record covering all lawful bases. The same schema is used
        regardless of `processing.legal-basis`. The `notice` field and
        `access-event.consent` sub-object are null for non-consent records and
        populated for consent records.
      properties:
        record-metadata:
          $ref: "#/components/schemas/RecordMetadata"
        notice:
          nullable: true
          description: >
            Populated for consent-based records; null for all other legal bases.
          allOf:
            - $ref: "#/components/schemas/NoticeFields"
        processing:
          $ref: "#/components/schemas/ProcessingFields"
        access-event:
          $ref: "#/components/schemas/AccessEventFields"
      required:
        - record-metadata
        - notice
        - processing
        - access-event

    # -------------------------------------------------------------------------
    # Response wrappers
    # -------------------------------------------------------------------------

    AccessToken:
      type: object
      description: >
        The access token issued on successful registration. Pass to Data Providers
        to enable access verification.
      properties:
        key:
          $ref: "#/components/schemas/AccessKey"
        expiry:
          type: string
          format: date-time
          nullable: true
          description: Mirrors `access-event.expiry` for convenience.
          example: "2027-11-10T17:07:01.580Z"
      required:
        - key

    RegisterAccessResponse:
      type: object
      properties:
        response:
          $ref: "#/components/schemas/ResponseMetadata"
        access-token:
          $ref: "#/components/schemas/AccessToken"
      required:
        - response
        - access-token

    VerifyAccessResponse:
      type: object
      description: >
        The full access record returned for verification. `notice` and
        `access-event.consent` will be null for non-consent records.
      properties:
        response:
          $ref: "#/components/schemas/ResponseMetadata"
        access-record:
          $ref: "#/components/schemas/AccessRecord"
      required:
        - response
        - access-record

    RevokeAccessResponse:
      type: object
      properties:
        response:
          $ref: "#/components/schemas/ResponseMetadata"
        ak:
          $ref: "#/components/schemas/AccessKey"
        revoked-at:
          type: string
          format: date-time
          description: UTC timestamp of revocation.
          example: "2025-06-01T14:22:00Z"
      required:
        - response
        - ak
        - revoked-at

    AccessRecordSummary:
      type: object
      description: A summary entry as returned in a list response.
      properties:
        ak:
          $ref: "#/components/schemas/AccessKey"
        record-metadata:
          $ref: "#/components/schemas/RecordMetadata"
        legal-basis:
          $ref: "#/components/schemas/LegalBasis"
        purpose:
          type: string
          example: "Energy efficiency analysis and tariff recommendations"
        data-types:
          $ref: "#/components/schemas/DataType"
        state:
          $ref: "#/components/schemas/AccessState"
        expiry:
          type: string
          format: date-time
          nullable: true
      required:
        - ak
        - record-metadata
        - legal-basis
        - purpose
        - data-types
        - state

    ListAccessRecordsResponse:
      type: object
      properties:
        response:
          $ref: "#/components/schemas/ResponseMetadata"
        mpxn:
          $ref: "#/components/schemas/MPxN"
        access-records:
          type: array
          items:
            $ref: "#/components/schemas/AccessRecordSummary"
      required:
        - response
        - mpxn
        - access-records

    AuthToken:
      type: object
      properties:
        bearer-token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires:
          type: integer
          description: Token lifetime in seconds from issue.
          example: 7200
      required:
        - bearer-token
        - expires

    ResponseMetadata:
      type: object
      properties:
        resource:
          type: string
          example: "/v1/access-records/ak_691df0c788ca043403b7fa90"
        timestamp:
          type: string
          format: date-time
          example: "2026-03-11T12:00:00Z"
        transaction-id:
          type: string
          description: Unique identifier for this request/response pair. Quote in support enquiries.
          example: "tid_691df0c788ca043403b7fa90"
      required:
        - resource
        - timestamp
        - transaction-id

    ErrorDetail:
      type: object
      properties:
        error-code:
          type: string
          example: "VAL001"
        message:
          type: string
          example: "Field 'mpxn' does not match the required pattern."
      required:
        - error-code
        - message

    ErrorResponse:
      type: object
      properties:
        response:
          $ref: "#/components/schemas/ResponseMetadata"
        errors:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ErrorDetail"
      required:
        - response
        - errors
